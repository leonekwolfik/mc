name: Build and test mc-web-ubuntu

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Test Directory
        run: |
          ls -la $GITHUB_WORKSPACE

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        id: build-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          tags: mc-web-ubuntu:latest
          outputs: type=oci,dest=image.tar

      - name: Upload built image artifact
        uses: actions/upload-artifact@v7
        with:
          name: built-image
          path: image.tar

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built image
        uses: actions/download-artifact@v8
        with:
          name: built-image
          path: .

      - name: Load image into Docker
        run: |
          docker load -i image.tar

      - name: Run container for smoke test
        run: |
          # start container in background mapping to arbitrary host port 27681
          docker run -d --name mc-smoke -p 27681:7681 mc-web-ubuntu:latest
          # wait for container to be healthy/responding (timeout 30s)
          for i in {1..30}; do
            sleep 1
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:27681/ | grep -q '^2\|^3'; then
              echo "service is responding"
              break
            fi
            echo "waiting for service..."
          done
          # if not responding, dump logs and fail
          if ! curl -s -o /dev/null -w "%{http_code}" http://localhost:27681/ | grep -q '^2\|^3'; then
            echo "Service did not start in time - dumping logs"
            docker logs mc-smoke || true
            docker ps -a || true
            exit 1
          fi

      - name: Run a simple interactive command via docker exec
        run: |
          # ensure bash is responsive
          docker exec mc-smoke bash -c 'echo hello-from-container' | grep -q hello-from-container

      - name: Stop and remove container
        if: always()
        run: |
          docker rm -f mc-smoke || true
