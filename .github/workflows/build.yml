name: Build and test mc-web-ubuntu

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-path: ${{ steps.build-image.outputs.image_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub 
        uses: docker/login-action@v2 
        with: 
            username: ${{ secrets.DOCKERHUB_USERNAME }} 
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: mc-web-ubuntu:latest
          outputs: type=docker,dest=image.tar

      - name: Build and push image 
        id: build-image 
        uses: docker/build-push-action@v5 
        with: 
            context: . 
            file: ./Dockerfile 
            push: true 
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/mc-web-ubuntu:latest 
            outputs: type=docker,dest=image.tar

      - name: Upload built image artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-image
          path: image.tar

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built image
        uses: actions/download-artifact@v4
        with:
          name: built-image
          path: .

      - name: Show image file
        run: |
          ls -lh image.tar
          file image.tar || true

      - name: Load image into Docker
        run: docker load -i image.tar

      - name: Run container for smoke test
        run: |
          docker run -d --name mc-smoke -p 27681:7681 mc-web-ubuntu:latest
          for i in {1..30}; do
            sleep 1
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:27681/ | grep -qE '^[23]'; then
              echo "service is responding"
              break
            fi
            echo "waiting for service..."
          done
          if ! curl -s -o /dev/null -w "%{http_code}" http://localhost:27681/ | grep -qE '^[23]'; then
            echo "Service did not start in time - dumping logs"
            docker logs mc-smoke || true
            docker ps -a || true
            exit 1
          fi

      - name: Run a simple command via docker exec
        run: docker exec mc-smoke bash -c 'echo hello-from-container' | grep -q hello-from-container

      - name: Stop and remove container
        if: always()
        run: docker rm -f mc-smoke || true
