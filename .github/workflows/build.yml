# .github/workflows/docker-publish.yml
name: Build and Push Docker Images

on:
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Ubuntu image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ubuntu
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/midnight-commander:ubuntu

      - name: Build and push Alpine image (+ latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.alpine
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/midnight-commander:alpine
            ${{ secrets.DOCKERHUB_USERNAME }}/midnight-commander:latest

  build-mc-x86:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Build mc binary for linux/amd64
        run: |
          mkdir -p artifacts
          docker run --rm --platform linux/amd64 \
            -v "${{ github.workspace }}/artifacts:/output" \
            alpine sh -c "apk add --no-cache mc && cp \$(which mc) /output/mc-amd64"

      - name: Upload mc-amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-amd64
          path: artifacts/mc-amd64

  build-mc-arm:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build mc binary for linux/arm64
        run: |
          mkdir -p artifacts
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}/artifacts:/output" \
            alpine sh -c "apk add --no-cache mc && cp \$(which mc) /output/mc-arm64"

      - name: Upload mc-arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-arm64
          path: artifacts/mc-arm64

  docker-ghcr:
    needs: [build-mc-x86, build-mc-arm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download mc-amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mc-amd64
          path: binaries

      - name: Download mc-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mc-arm64
          path: binaries

      - name: Make binaries executable
        run: chmod +x binaries/mc-amd64 binaries/mc-arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Alpine image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ghcr
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:alpine

  test:
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      matrix:
        tag: [ubuntu, alpine]

    steps:
      - name: Pull image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/midnight-commander:${{ matrix.tag }}

      - name: Test - kontener startuje i nie pada
        run: |
          docker run --rm -d --name test_${{ matrix.tag }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/midnight-commander:${{ matrix.tag }}
          sleep 3
          docker inspect test_${{ matrix.tag }} --format='{{.State.Status}}' | grep -q running
          docker stop test_${{ matrix.tag }}

      - name: Test - mc jest zainstalowany
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/midnight-commander:${{ matrix.tag }} \
            bash -c "which mc && TERM=xterm mc --version"

      - name: Test - ttyd jest zainstalowany
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/midnight-commander:${{ matrix.tag }} \
            bash -c "which ttyd && ttyd --version"

      - name: Test - tini jest zainstalowany
        run: |
          docker run --rm --entrypoint tini \
            ${{ secrets.DOCKERHUB_USERNAME }}/midnight-commander:${{ matrix.tag }} \
            -- echo "tini OK"

      - name: Test - snapshot katalogów istnieje
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/midnight-commander:${{ matrix.tag }} \
            bash -c "test -f /etc/system_dirs_snapshot.txt && echo 'snapshot OK' && cat /etc/system_dirs_snapshot.txt"

      - name: Test - entrypoint.sh istnieje i jest wykonywalny
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/midnight-commander:${{ matrix.tag }} \
            bash -c "test -x /entrypoint.sh && echo 'entrypoint OK'"

      - name: Test - port 7681 jest wyeksponowany
        run: |
          docker inspect ${{ secrets.DOCKERHUB_USERNAME }}/midnight-commander:${{ matrix.tag }} \
            --format='{{json .Config.ExposedPorts}}' | grep -q "7681"

      - name: Test - wykrycie zamontowanego wolumenu jako katalog startowy MC
        run: |
          RANDOM_DIR=$(mktemp -d /tmp/truenas_volume_XXXXXX)
          VOLUME_NAME=$(basename $RANDOM_DIR)

          RESULT=$(docker run --rm \
            -e ENTRYPOINT_TEST_MODE=1 \
            -v "$RANDOM_DIR:/$VOLUME_NAME" \
            ${{ secrets.DOCKERHUB_USERNAME }}/midnight-commander:${{ matrix.tag }} | tail -1)

          echo "Wykryty katalog startowy: $RESULT"
          echo "Oczekiwany katalog: /$VOLUME_NAME"

          if [ "$RESULT" = "/$VOLUME_NAME" ]; then
            echo "✅ Test passed"
          else
            echo "❌ Test failed - MC nie wystartował w zamontowanym katalogu"
            exit 1
          fi

          rm -rf $RANDOM_DIR